<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ColorVisualization</title>
</head>
<body class="bg-gray-100 font-sans">

    <!-- 顶部 -->
    <div class="bg-blue-600 text-white p-5 shadow">
        <h1 class="text-2xl font-bold">🎨 图片颜色聚类可视化系统</h1>
        <p class="text-sm">K-means + ECharts + AI分析</p>
    </div>

    <div class="p-6 max-w-5xl mx-auto">

        <!-- 控制面板 -->
        <div class="bg-white p-4 rounded-xl shadow mb-5">
            
            <input type="file" id="upload" class="mb-3" />

            <div class="flex items-center gap-3 mb-3">
                <span>K值：</span>
                <input type="range" id="kRange" min="3" max="10" value="5" class="flex-1">
                <span id="kValue">5</span>
            </div>

            <div class="flex gap-4">
                <div>
                    图表：
                    <select id="chartType" class="border rounded px-2 py-1">
                        <option value="pie">饼图</option>
                        <option value="bar">柱状图</option>
                    </select>
                </div>

                <div>
                    颜色空间：
                    <select id="colorSpace" class="border rounded px-2 py-1">
                        <option value="rgb">RGB</option>
                        <option value="lab">LAB</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 原图展示 -->
        <div class="bg-white p-4 rounded-xl shadow mb-5">
            <h3 class="font-semibold mb-2">🖼️ 原图</h3>
            <img id="preview" class="max-w-full max-h-[300px] object-contain rounded" />
        </div>

        <!-- 图表 -->
        <div class="bg-white p-4 rounded-xl shadow mb-5">
            <div id="chart" class="w-full h-[400px]"></div>
        </div>

        <!-- AI分析 -->
        <div class="bg-white p-4 rounded-xl shadow mb-5">
            <h3 class="font-semibold mb-2">🤖 AI颜色分析</h3>
            <div id="aiResult" class="text-gray-700">等待分析...</div>
        </div>

        <!-- 颜色块展示（加分🔥） -->
        <div class="bg-white p-4 rounded-xl shadow mb-5">
            <h3 class="font-semibold mb-2">🎨 颜色分布</h3>
            <div id="colorBlocks" class="flex gap-2 flex-wrap"></div>
        </div>

        <!-- 项目说明 -->
        <div class="text-gray-600 text-sm">
            <p>基于K-means算法的图像颜色聚类分析系统，支持RGB/LAB切换，并结合AI进行美学评价。</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script type="module" src="./main.js"></script>

</body>
</html>
